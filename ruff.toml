line-length = 120
# 解释器为 3.14，但 ruff target 保持 py313：
# py314 下 ruff 按 PEP 649 假设注解延迟求值，会把 FastAPI/Pydantic 运行期需要的
# 导入（AsyncSession/User 等）误判为可移入 TYPE_CHECKING 块，套用后会破坏依赖注入。
target-version = "py313"

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "RUF",    # Ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "RUF001", # ambiguous unicode character in string
    "RUF002", # ambiguous unicode character in docstring
    "RUF003", # ambiguous unicode character in comment
    "B008",   # function call in argument defaults - FastAPI Depends pattern
]

[lint.per-file-ignores]
# SQLAlchemy models need runtime imports for Mapped[] type hints
"app/models/*.py" = ["TC003"]

[lint.isort]
known-first-party = ["app"]

[format]
quote-style = "double"
indent-style = "space"
